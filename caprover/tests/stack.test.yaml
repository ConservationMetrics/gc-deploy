# caproverUrl hostname is hard-coded in `install-caprover.sh`
caproverUrl: "http://captain.test-gc-deploy.localhost"
caproverPassword: "captain42"  # the Caprover default
webappsUseSsl: false

postgres:
  app_name: test-postgres  # matches regex in Makefile to cleanup data volumes
  user: "postgres"
  pass: "test_pg_password"
  database: postgres
  version: 16
  from_vm:
    host: 127.0.0.1
    port: 15432   # the container will map to this port on the host VM
    ssl: false
  from_container:
    host: srv-captain--test-postgres  # matches app_name
    port: 5432
    ssl: false

redis:
  app_name: test-redis
  redis_password: "test-redis-key"

windmill-only:
  app_name: test-windmill

superset-only:
  redis_url: "redis://:test-redis-key@srv-captain--test-redis:6379"
  redis_key_prefix: ""

gc-landing-page:
  app_name: gc-landing-page

gc-explorer:
  postgres_database: "warehouse"

comapeo-cloud:
  app_name: test-comapeo  # matches regex in Makefile to cleanup data volumes

filebrowser:
  app_name: test-files  # matches regex in Makefile to cleanup data volumes
